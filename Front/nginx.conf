server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # 1. Aplicación Vue
  location / {
    try_files $uri $uri/ /index.html;
  }

  # 2. Proxy para Grafana
  location /grafana/ {
    proxy_pass http://192.168.24.13:3000/;
    
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # Reescribir cookies para que funcionen en el subdirectorio /grafana/
    # Esto es vital para que el login se mantenga.
    proxy_cookie_path / /grafana/;
    
    # Ajustar redirecciones de Grafana
    proxy_redirect http://192.168.24.13:3000/ /grafana/;
    proxy_redirect / /grafana/;

    # Tiempos de espera
    proxy_connect_timeout 90;
    proxy_send_timeout 90;
    proxy_read_timeout 90;
  }
}
